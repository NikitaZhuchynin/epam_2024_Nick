<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar and House</title>
    <link rel="stylesheet" type="text/css" href="css/style.css">
</head>
<body>
  <section class="calendar-section"></section>
    <div class="calendar">
        <div class="calendar__header">
            <h2>August</h2>
        </div>
        <div class="calendar__weekdays">
            <span class="weekday">Sun</span>
            <span class="weekday">Mon</span>
            <span class="weekday">Tue</span>
            <span class="weekday">Wed</span>
            <span class="weekday">Thu</span>
            <span class="weekday">Fri</span>
            <span class="weekday">Sat</span>
        </div>
        <div class="calendar__days">
            <label class="calendar__day calendar__day--inactive"><span>27</span></label>
            <label class="calendar__day calendar__day--inactive"><span>28</span></label>
            <label class="calendar__day calendar__day--inactive"><span>29</span></label>
            <label class="calendar__day calendar__day--inactive"><span>30</span></label>
            <label class="calendar__day calendar__day--inactive"><span>31</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>1</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>2</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>3</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>4</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>5</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>6</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>7</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>8</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>9</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>10</span></label> 
            <label class="calendar__day"><input type="radio" name="day"><span>11</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>12</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>13</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>14</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>15</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>16</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>17</span></label> 
            <label class="calendar__day vacation"><input type="radio" name="day"><span>18</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>19</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>20</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>21</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>22</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>23</span></label>
            <label class="calendar__day vacation"><input type="radio" name="day"><span>24</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>25</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>26</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>27</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>28</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>29</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>30</span></label>
            <label class="calendar__day"><input type="radio" name="day"><span>31</span></label>
            <label class="calendar__day calendar__day--inactive"><span>1</span></label>
            <label class="calendar__day calendar__day--inactive"><span>2</span></label>
            <label class="calendar__day calendar__day--inactive"><span>3</span></label>
            <label class="calendar__day calendar__day--inactive"><span>4</span></label>
            <label class="calendar__day calendar__day--inactive"><span>5</span></label>
            <label class="calendar__day calendar__day--inactive"><span>6</span></label>
        </div>
    </div>
</section>

<section class="house section"></section>
   <div class="house">
        <div class="roof"></div>
        <div class="body">
            <div class="window"></div>
            <div class="door">
                <div class="door-handle"></div>
            </div>
            <div class="chimney"></div>
        </div>
    </div>
      </body>
    </html>
